version: '3.9'

services:
  portfolio:
    build: .
    ports:
      - '3000:8787'
    environment:
      NODE_ENV: production
      PORT: 8787
      APP_ORIGIN: http://localhost:3000
    volumes:
      - ./server/storage:/app/server/storage
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:8787/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
